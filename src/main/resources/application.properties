# ───────────────────────────────────────────
#  Server
# ───────────────────────────────────────────
server.port=8080

# ───────────────────────────────────────────
#  DataSource
# ───────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sky_survey_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:sky_user}
spring.datasource.password=${DB_PASSWORD:sky_pass_change_me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ───────────────────────────────────────────
#  JPA / Hibernate
# ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ───────────────────────────────────────────
#  File Uploads — increased for multiple PDFs
# ───────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.resolve-lazily=false

# ───────────────────────────────────────────
#  Upload directory
# ───────────────────────────────────────────
app.upload.dir=uploads

# ───────────────────────────────────────────
#  XML Media Type
# ───────────────────────────────────────────
spring.mvc.contentnegotiation.favor-parameter=false
spring.mvc.contentnegotiation.media-types.xml=application/xml

# ───────────────────────────────────────────
#  JWT
# ───────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:s3cr3t_sky_w0rld_surv3y_jwt_k3y_32chars!!}
app.jwt.expiration-ms=86400000

# ───────────────────────────────────────────
#  Logging
# ───────────────────────────────────────────
logging.level.com.skyworld.survey.security=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.multipart=DEBUG